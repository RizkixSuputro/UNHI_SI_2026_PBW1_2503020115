<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!-- button -->
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-success">Success</button>
    <button class="btn btn-danger">Danger</button>
    <button class="btn btn-warning">Warning</button>

    <!-- card -->
    <div class="card mt-5" style="width: 18rem">
      <div class="card-body">
        <h5 class="card-title">Judul Card</h5>
        <p class="card-text">Isi konten card</p>
        <a href="#" class="btn btn-primary">Detail</a>
      </div>
    </div>

    <!-- alert -->
    <div class="alert alert-success mt-5">Data berhasil disimpan!</div>

    <div class="alert alert-danger">Terjadi kesalahan!</div>

    <!-- Badge -->
    <h3>Pesan <span class="badge bg-primary mt-5">5</span></h3>

    <!-- contoh badge menggunakan button -->
    <button class="btn btn-primary mt-3">
      Notifikasi <span class="badge bg-light text-dark">3</span>
    </button>

    <!-- list group -->
    <ul class="list-group mt-5">
      <li class="list-group-item">Item 1</li>
      <li class="list-group-item">Item 2</li>
      <li class="list-group-item">Item 3</li>
    </ul>

    <!-- list dengan aktif/interaktif -->
    <ul class="list-group mt-3">
      <li class="list-group-item active">Item aktif</li>
      <li class="list-group-item">Item lainnya</li>
    </ul>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
