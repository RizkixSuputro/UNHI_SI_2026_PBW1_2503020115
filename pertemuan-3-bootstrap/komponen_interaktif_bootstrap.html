<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!-- Modal -->
    <button
      class="btn btn-primary"
      data-bs-toggle="modal"
      data-bs-target="#exampleModal"
    >
      Buka Modal
    </button>

    <div class="modal fade" id="exampleModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Judul Modal</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">Ini adalah isi modal</div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Tutup
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- carousel -->
    <div id="carouselExample" class="carousel slide">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="img1.jpg" class="d-block w-100" />
        </div>

        <div class="carousel-item">
          <img src="img2.jpg" class="d-block w-100" />
        </div>
      </div>

      <button
        class="carousel-control-prev"
        data-bs-target="#carouselExample"
        data-bs-slide="prev"
      ></button>

      <button
        class="carousel-control-next"
        data-bs-target="#carouselExample"
        data-bs-slide="next"
      ></button>
    </div>

    <!-- collapse -->
    <button
      class="btn btn-primary mt-5"
      data-bs-toggle="collapse"
      data-bs-target="#demo"
    >
      Tampilkan
    </button>

    <div class="collapse" id="demo">
      <div class="card card-body">Konten tersembunyi</div>
    </div>

    <!-- tooltip -->
    <button
      class="btn btn-secondary mt-5"
      data-bs-toggle="tooltip"
      title="Ini tooltip"
    >
      Hover saya
    </button>

    <!-- accordion -->
    <div class="accordion mt-5" id="accordionExample">
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button
            class="accordion-button"
            data-bs-toggle="collapse"
            data-bs-target="#item1"
          >
            Pertanyaan 1
          </button>
        </h2>

        <div id="item1" class="accordion-collapse collapse show">
          <div class="accordion-body">Jawaban 1</div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script>
      const tooltipTriggerList = document.querySelectorAll(
        '[data-bs-toggle="tooltip"]',
      );
      tooltipTriggerList.forEach((el) => new bootstrap.Tooltip(el));
    </script>
  </body>
</html>
