<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!-- margin & padding utilities -->
    <div class="mt-5 p-3 bg-light">Konten dengan margin atas dan padding</div>

    <!-- Display utilities -->
    <div class="d-none">Elemen ini disembunyikan</div>
    <div class="d-block">Elemen block</div>

    <!-- flexbox utilities -->
    <div class="d-flex mt-3">
      <div class="p-2">Item 1</div>
      <div class="p-2">Item 2</div>
      <div class="p-2">Item 3</div>
    </div>

    <!-- flexbox dengan jarak -->
    <div class="d-flex justify-content-between mt-3">
      <div>Menu 1</div>
      <div>Menu 2</div>
    </div>

    <!-- alignment utilities -->
    <p class="text-center">Teks berada di tengah</p>

    <!-- vertical alignment menggunakan flexbox -->
    <div class="d-flex align-items-center" style="height: 200px">
      Konten berada di tengah secara vertikal
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
