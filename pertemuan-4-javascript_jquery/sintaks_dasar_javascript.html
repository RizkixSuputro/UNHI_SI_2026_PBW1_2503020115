<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sintskd dasar</title>
  </head>
  <body>
    <p>Belajar mengenal sintaks dasar Javascript</p>

    <script>
      // struktur dasar penulisan
      console.log("Hello World");
      alert("Javascript");

      //   case sensitive
      var nama = "Budi";
      var Nama = "Andi";

      console.log(nama); //budi
      console.log(Nama); //andi

      //   penulisan komentar
      // ini komentar satu baris
      console.log("hello");

      //   komentar banyak baris
      /*
        ini komentar
        lebih dari satu baris
      */
      console.log("hello");

      //   penulisan output

      // console.log
      console.log("hello dari console");

      // alert
      alert("ini popup alert");

      // document.write
      document.write("hello di halaman web");

      //   blok kode
      {
        console.log("baris 1");
        console.log("baris 2");
      }

      //   penulisan variabel sederhana
      let nama = "Budi";
      console.log(nama);

      //   penulisan string
      let pesan1 = "Hello";
      let pesan2 = "Javascript";

      // penulisan angka
      let umur = 20;
      let harga = 10000;

      // contoh program lengkap
      // variabel
      let nama = "Andi";

      // Output
      console.log(nama);
      alert("halo " + nama);
    </script>
  </body>
</html>
