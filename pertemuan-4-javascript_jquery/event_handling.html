<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document Object Model</title>
  </head>
  <body>
    <!-- inline event -->
    <button onclick="tampilPesan()">Klik Saya</button>

    <!-- event melalui javascript -->
    <button id="btn">Klik Saya</button>

    <!-- event listener -->
    <button id="btn">Klik Saya</button>

    <!-- event pada form -->
    <form id="form">
      <input type="text" id="nama" placeholder="Masukkan nama" />
      <button type="submit">Kirim</button>
    </form>

    <!-- contoh interaksi sederhana -->
    <p id="teks">Klik tombol untuk ubah warna</p>
    <button id="btn">Ubah Warna</button>

    <!-- event toggle (contoh praktik) -->
    <button id="btn">Tampilkan / Sembunyikan</button>
    <p id="konten">Ini konten</p>

    <script>
      // inline event
      function tampilPesan() {
        alert("Tombol diklik!");
      }

      //   event melalui javascript
      document.getElementById("btn").onclick = function () {
        alert("Klik berhasil");
      };

      //   event listener
      document.getElementById("btn").addEventListener("click", function () {
        alert("Button diklik");
      });

      //   event pada form
      document.getElementById("form").addEventListener("submit", function (e) {
        e.preventDefault();
        let nama = document.getElementById("nama").value;
        alert("Halo " + nama);
      });

      // event object
      document.addEventListener("click", function (e) {
        console.log(e.target);
      });

      //   contoh interaksi sederhana
      document.getElementById("btn").addEventListener("click", function () {
        document.getElementById("teks").style.color = "red";
      });

      //   event toggle
      document.getElementById("btn").addEventListener("click", function () {
        let el = document.getElementById("konten");

        if (el.style.display === "none") {
          el.style.display = "block";
        } else {
          el.style.display = "none";
        }
      });
    </script>
  </body>
</html>
