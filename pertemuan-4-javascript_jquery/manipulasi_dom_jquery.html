<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manipilasi DOM JQUERY</title>
    <!-- jquery cdn -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>
  <body>
    <!-- contoh program sederhana -->
    <h1 id="judul">Judul Lama</h1>
    <button id="btn">Ubah Judul</button>

    <!-- contoh tambah element -->
    <button id="tambah">Tambah Paragraf</button>
    <div id="konten"></div>

    <script>
      $(document).ready(function () {
        // mengubah teks
        $("#judul").text("Judul Baru");

        // mengubah html
        $("#judul").html("<b>Judul Baru</b>");

        // mengubah css
        $("#judul").css("color", "red");

        // append
        $("#konten").append("<p>Paragraf baru</p>");

        // prepend
        $("#konten").prepend("<p>Paragraf di atas</p>");

        // after
        $("#judul").after("<p>Setelah judul</p>");

        // before
        $("#judul").before("<p>Sebelum judul</p>");

        // remove
        $("#hapus").remove();

        // empty
        $("#konten").empty();

        // mengubah isi atribut
        $("#gambar").attr("src", "gambar2.jpg");

        // contoh program sederhana
        $(function () {
          $("#btn").click(function () {
            $("#judul").text("Judul Baru dengan jQuery");
            $("#judul").css("color", "blue");
          });
        });
      });

      //   contoh tambah element
      $(function () {
        $("#tambah").click(function () {
          $("#konten").append("<p>Paragraf baru ditambahkan</p>");
        });
      });
    </script>
  </body>
</html>
