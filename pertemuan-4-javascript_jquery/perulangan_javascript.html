<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perulangan</title>
  </head>
  <body>
    <script>
      // perulangan for
      for (let i = 1; i <= 5; i++) {
        console.log("Perulangan ke-" + i);
      }

      //   perulangan while
      let a = 1;

      while (a <= 5) {
        console.log(a);
        a++;
      }

      //   perulagan do while
      let j = 1;

      do {
        console.log(j);
        j++;
      } while (j <= 5);

      //   perulangan pada array
      let buah = ["Apel", "Jeruk", "Mangga"];

      for (let n = 0; n < buah.length; n++) {
        console.log(buah[n]);
      }

      //   perulangan for of (modern)
      let buahLokal = ["Apel", "Jeruk", "Mangga"];

      for (let item of buahLokal) {
        console.log(item);
      }

      //   break
      for (let i = 1; i <= 5; i++) {
        if (i === 3) break;
        console.log(i);
      }

      //   continue
      for (let i = 1; i <= 5; i++) {
        if (i === 3) continue;
        console.log(i);
      }

      //   contoh program sederhana
      for (let i = 1; i <= 5; i++) {
        document.write("Angka: " + i + "<br>");
      }
    </script>
  </body>
</html>
