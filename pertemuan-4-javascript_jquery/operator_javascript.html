<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>javascript</title>
  </head>
  <body>
    <script>
      // operator aritmatika
      let a = 10;
      let b = 3;

      console.log(a + b); // 13
      console.log(a % b); // 1

      //   operator perbandingan
      let x = 10;
      let y = "10";

      console.log(x == y); // true
      console.log(x === y); // false

      //   operator logika
      let umur = 20;
      let punyaKTP = true;

      console.log(umur >= 17 && punyaKTP); // true

      //   operator assignment
      let angka = 10;

      angka += 5;
      console.log(angka); // 15

      //   operator increment dan decrement
      let i = 5;

      i++;
      console.log(i); // 6

      i--;
      console.log(i); // 5

      //   operator string (penggabungan)
      let nama = "Budi";
      let pesan = "Halo " + nama;

      console.log(pesan); // Halo Budi

      //   contoh sederhana
      let nilai = 80;

      // Percabangan dengan operator
      if (nilai >= 75) {
        console.log("Lulus");
      } else {
        console.log("Tidak Lulus");
      }
    </script>
  </body>
</html>
