<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variabel tipe data</title>
  </head>
  <body>
    <script>
      // let
      let nama = "Budi";

      //   const
      const pi = 3.14;

      // var
      var umur = 20;

      // aturan penamaan variabel
      let namaLengkap = "Andi Saputra";
      let umurUser = 25;

      //   tipe data dalam java script

      // string
      let name = "Budi";
      let kota = "Denpasar";

      // number
      let umur = 20;
      let harga = 15000;

      // boolean
      let isLogin = true;
      let isAdmin = false;

      // array
      let buah = ["apel", "jeruk", "mangga"];

      // mengecek tipe data
      let namaSiswa = "Budi";
      console.log(typeof nama); // string

      // contoh lengkap
      let namaMahasiswa = "Andi";
      let umur = 22;
      let status = true;

      console.log("Nama: " + namaMahasiswa);
      console.log("Umur: " + umur);
      console.log("Status: " + status);
    </script>
  </body>
</html>
