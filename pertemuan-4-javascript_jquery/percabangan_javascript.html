<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Percabangan</title>
  </head>
  <body>
    <script>
      // if statement
      let nilai = 80;

      if (nilai >= 75) {
        console.log("Lulus");
      }

      //   if else
      let nilaiSiswa = 60;

      if (nilaiSiswa >= 75) {
        console.log("Lulus");
      } else {
        console.log("Tidak Lulus");
      }

      //   if else if else
      let nilaiMahasiswa = 85;

      if (ilaiMahasiswa >= 90) {
        console.log("A");
      } else if (nilaiMahasiswa >= 75) {
        console.log("B");
      } else if (nilaiMahasiswa >= 60) {
        console.log("C");
      } else {
        console.log("D");
      }

      //   switch case
      let hari = "Senin";

      switch (hari) {
        case "Senin":
          console.log("Hari kerja");
          break;
        case "Minggu":
          console.log("Hari libur");
          break;
        default:
          console.log("Hari biasa");
      }

      //   operator tennary
      let umur = 18;

      let status = umur >= 17 ? "Dewasa" : "Anak-anak";

      console.log(status);

      //   kombinasi dengan operator logika
      let umurPengguna = 20;
      let punyaKTP = true;

      if (umurPengguna >= 17 && punyaKTP) {
        console.log("Boleh memilih");
      } else {
        console.log("Tidak boleh memilih");
      }

      //   contoh program sederhana
      let skor = 70;

      if (skor >= 75) {
        alert("Anda Lulus");
      } else {
        alert("Anda Tidak Lulus");
      }
    </script>
  </body>
</html>
